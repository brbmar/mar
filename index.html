<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    overflow: hidden;
    background: #ffffff;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  section {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(5rem, 18vw, 14rem);
    color: #000000;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .contact-link {
    position: fixed;
    bottom: 50px;
    left: 50px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: 1.25rem;
    letter-spacing: 0.05em;
    color: #000000;
    text-decoration: none;
    z-index: 2;
  }

  .instagram-link {
    position: fixed;
    bottom: 50px;
    right: 50px;
    text-decoration: none;
    display: flex;
    align-items: center;
    z-index: 2;
  }

  .instagram-link svg {
    width: 20px;
    height: 20px;
    fill: #000000;
  }

  /* black dot — top right corner */
  .dot {
    position: fixed;
    top: 50px;
    right: 50px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #000000;
    z-index: 2;
  }

  /* svg logo — top left, twice dot size = 22px tall */
  .logo-mark {
    position: fixed;
    top: 50px;
    left: 50px;
    z-index: 2;
    height: 22px;
    display: flex;
    align-items: center;
  }

  .logo-mark svg {
    height: 22px;
    width: auto;
    fill: #000000;
    display: block;
  }
</style>
</head>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');

  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  const COUNT = 55;

  const particles = Array.from({ length: COUNT }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.8 + 0.4,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
    opacity: Math.random() * 0.35 + 0.08,
  }));

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // draw connecting lines between nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(90,88,84,${0.22 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // draw particles
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(75,73,69,${p.opacity})`;
      ctx.fill();
    }
  }

  function update() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  });

  loop();
</script>
