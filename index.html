<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC — Chrome 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060607; overflow:hidden; cursor:grab; }
body:active { cursor:grabbing; }
#c { display:block; width:100vw; height:100vh; }

</style>
</head>
<body>
<canvas id="c"></canvas>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/SVGLoader.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(44, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 0, 320);

// ── Dark environment map ───────────────────────────────────────────────────────
function buildEnvMap() {
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const eqW = 1024, eqH = 512;
  const ec = document.createElement('canvas');
  ec.width = eqW; ec.height = eqH;
  const ex = ec.getContext('2d');
  ex.fillStyle = '#050506'; ex.fillRect(0,0,eqW,eqH);
  const bands = [
    { y: eqH*0.28, h: eqH*0.04,  b: 0.92 },
    { y: eqH*0.72, h: eqH*0.025, b: 0.55 },
    { y: eqH*0.48, h: eqH*0.012, b: 0.35 },
  ];
  for (const band of bands) {
    const g = ex.createLinearGradient(0, band.y-band.h, 0, band.y+band.h);
    const v = Math.round(band.b*255);
    g.addColorStop(0, `rgba(${v},${v},${v},0)`);
    g.addColorStop(0.5, `rgba(${v},${v},${v},1)`);
    g.addColorStop(1, `rgba(${v},${v},${v},0)`);
    ex.fillStyle=g; ex.fillRect(0, band.y-band.h, eqW, band.h*2);
  }
  for (let i=0;i<12;i++) {
    const x=Math.random()*eqW, w=20+Math.random()*120, y=eqH*0.22+Math.random()*eqH*0.56;
    const a=0.4+Math.random()*0.5;
    const sg=ex.createLinearGradient(x,0,x+w,0);
    sg.addColorStop(0,'rgba(255,255,255,0)'); sg.addColorStop(0.5,`rgba(255,255,255,${a})`); sg.addColorStop(1,'rgba(255,255,255,0)');
    ex.fillStyle=sg; ex.fillRect(x,y,w,3);
  }
  const t=new THREE.CanvasTexture(ec);
  t.mapping=THREE.EquirectangularReflectionMapping; t.encoding=THREE.sRGBEncoding;
  const rt=pmrem.fromEquirectangular(t); t.dispose(); pmrem.dispose();
  return rt.texture;
}
const envMap = buildEnvMap();
scene.environment = envMap;

function darkChromeMat() {
  return new THREE.MeshStandardMaterial({
    color: 0x1a1c1e, metalness: 1.0, roughness: 0.12,
    envMap, envMapIntensity: 4.5,
  });
}

// ── SVG extrusion ─────────────────────────────────────────────────────────────
// Parse the full original path (both subpaths) — SVGLoader's createShapes uses
// ShapeUtils.isClockWise to automatically identify the inner subpath as a hole.
// isCCW=true matches Illustrator's default winding (outer = CCW, inner = CW→hole).

const FULL_PATH = `M242.74,127.03c-5.72,0-10.01-.6-12.87-1.81-2.86-1.21-4.79-3.41-5.78-6.6-.99-3.19-1.48-7.97-1.48-14.35v-63.68c0-13.41-3.14-23.53-9.4-30.36-6.27-6.81-15.23-10.23-26.89-10.23-8.8,0-17.27,2.37-25.41,7.09-8.14,4.73-16.28,12.04-24.42,21.94-1.54-9.45-5.39-16.66-11.55-21.61-6.16-4.95-14.19-7.42-24.09-7.42-17.16,0-33.33,9.24-48.5,27.72-.22-8.14-1.38-14.68-3.46-19.63-2.09-4.95-4.24-7.42-6.43-7.42l-1.98.33L.88,20.13C0,20.57-.22,21.28.22,22.27c.44.99,1.1,1.48,1.98,1.48h.33c8.36-3.3,14.19-4.95,17.49-4.95,3.96,0,6.81,1.65,8.58,4.95,1.76,3.3,2.64,8.58,2.64,15.84v64.67c0,6.38-.49,11.17-1.48,14.35-.99,3.19-2.86,5.39-5.61,6.6-2.75,1.21-6.98,1.81-12.7,1.81-.66,0-.99.66-.99,1.98s.33,1.98.99,1.98c5.28,0,9.46-.11,12.54-.33l17.82-.33,17.82.33c1.44.1,3.17.18,5.14.23-.02.75-.07,1.48-.07,2.24,0,11,2.36,21.45,7.09,31.35,4.73,9.9,11.93,17.98,21.61,24.25,9.68,6.27,21.66,9.4,35.97,9.4,9.68,0,18.42-1.6,26.23-4.78,7.81-3.19,15.56-8.3,23.26-15.34.66-.44.71-.99.16-1.65-.55-.66-1.15-.99-1.81-.99h-.66c-9.46,7.04-20.46,10.56-33,10.56-18.48,0-32.23-5.88-41.24-17.65-9.02-11.76-13.53-26.89-13.53-45.37,0-15.84,3.3-28.54,9.9-38.11,4.6-6.68,10.53-10.97,17.7-12.99v32.46c0,9.24-1.32,15.34-3.96,18.31-2.64,2.97-8.03,4.45-16.17,4.45-.66,0-.99.66-.99,1.98s.33,1.98.99,1.98c5.28,0,9.45-.11,12.54-.33l17.82-.33,18.15.33c3.08.22,7.37.33,12.87.33.44,0,.66-.66.66-1.98s-.22-1.98-.66-1.98c-8.36,0-13.86-1.49-16.5-4.45-2.64-2.97-3.96-9.08-3.96-18.31v-32.05c1.07.43,2.05.93,2.92,1.53,3.19,2.2,5.99,5.72,8.41,10.56,3.52,7.92,8.8,11.88,15.84,11.88,3.74,0,6.76-1.1,9.07-3.3,2.31-2.2,3.46-4.95,3.46-8.25,0-5.94-4.02-10.89-12.04-14.85-8.03-3.96-16.99-5.94-26.89-5.94-.26,0-.52.02-.78.02v-29.56c5.28-5.94,11.16-10.67,17.65-14.19,6.49-3.52,12.92-5.28,19.3-5.28,9.45,0,16.44,3.08,20.95,9.24,4.51,6.16,6.76,15.73,6.76,28.71v51.47c0,9.24-1.32,15.34-3.96,18.31-2.64,2.97-8.14,4.45-16.5,4.45-.44,0-.66.66-.66,1.98s.22,1.98.66,1.98c5.5,0,9.79-.11,12.87-.33l17.82-.33,18.48.33c3.08.22,7.15.33,12.21.33.88,0,1.32-.66,1.32-1.98s-.44-1.98-1.32-1.98ZM103.28,72.26c-11.22,5.61-20.46,13.64-27.72,24.09-6.11,8.79-9.61,18.88-10.58,30.23-2.15-.3-3.94-.76-5.37-1.36-2.86-1.21-4.78-3.41-5.78-6.6-.99-3.19-1.48-7.97-1.48-14.35V33.65c5.28-5.94,11.05-10.56,17.32-13.86s12.59-4.95,18.97-4.95c9.46,0,16.44,3.08,20.95,9.24,4.51,6.16,6.76,15.73,6.76,28.71v14.25c-4.41,1.33-8.77,3.06-13.08,5.22Z`;

const svgMarkup = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 244.06 198.14"><path d="${FULL_PATH}"/></svg>`;
const loader = new THREE.SVGLoader();
const parsed = loader.parse(svgMarkup);

// createShapes internally calls ShapeUtils.isClockWise on each subpath.
// For Illustrator exports the outer path is CCW and the inner is CW,
// so passing isCCW=true correctly assigns the inner as a hole.
const shapes = THREE.SVGLoader.createShapes(parsed.paths[0]);

const DEPTH = 22.5;
const EXTRUDE_OPTS = {
  depth: DEPTH,
  bevelEnabled: true,
  bevelThickness: 5.5,
  bevelSize: 4.5,
  bevelOffset: 0,
  bevelSegments: 28,
  curveSegments: 128, // maximum smoothness — eliminates tessellation dent
};

const pivot = new THREE.Group();
scene.add(pivot);
const logoGroup = new THREE.Group();
pivot.add(logoGroup);

shapes.forEach(shape => {
  const geo = new THREE.ExtrudeGeometry(shape, EXTRUDE_OPTS);
  geo.computeVertexNormals();
  logoGroup.add(new THREE.Mesh(geo, darkChromeMat()));
});

// Flip SVG Y axis, then center on pivot origin
logoGroup.scale.set(1, -1, 1);

// Compute bounding box and center
const box = new THREE.Box3().setFromObject(pivot);
const center = box.getCenter(new THREE.Vector3());
const size   = box.getSize(new THREE.Vector3());
logoGroup.position.set(-center.x, -center.y, -center.z);

// ── Scale logo to fill 50% of viewport ────────────────────────────────────────
// After centering, fit the logo so its largest dimension = 50% of viewport.
// We compute the world-space height of the camera frustum at z=0, then scale.
function fitLogoToViewport() {
  // Recompute box after centering
  const b2 = new THREE.Box3().setFromObject(pivot);
  const s2  = b2.getSize(new THREE.Vector3());
  const logoMax = Math.max(s2.x, s2.y); // largest 2D dimension

  // World-space frustum height at depth 0 (where logo sits)
  const dist = camera.position.z; // camera is at z=320, logo at z=0
  const fovRad = (camera.fov * Math.PI) / 180;
  const frustumH = 2 * Math.tan(fovRad / 2) * dist;
  const frustumW = frustumH * camera.aspect;
  const frustumMin = Math.min(frustumW, frustumH);

  // Mobile gets 35%, desktop gets 25%
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || innerWidth < 768;
  const targetSize = frustumMin * (isMobile ? 0.35 : 0.25);
  const scaleFactor = targetSize / logoMax;
  pivot.scale.setScalar(scaleFactor);
}
fitLogoToViewport();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  fitLogoToViewport();
});

// ── Stars ──────────────────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const DIM=2200, MED=60, HERO=18, SC=DIM+MED+HERO;
const sp=new Float32Array(SC*3), ss=new Float32Array(SC), stype=new Float32Array(SC);
for (let i=0;i<SC;i++){
  sp[i*3]=(Math.random()-.5)*2800; sp[i*3+1]=(Math.random()-.5)*2800; sp[i*3+2]=(Math.random()-.5)*2800;
  if(i<DIM){        ss[i]=0.3+Math.random()*1.4; stype[i]=0.0; }
  else if(i<DIM+MED){ ss[i]=3.5+Math.random()*3.0; stype[i]=0.5; }
  else {              ss[i]=8.0+Math.random()*7.0; stype[i]=1.0; }
}
starGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
starGeo.setAttribute('size',new THREE.BufferAttribute(ss,1));
starGeo.setAttribute('stype',new THREE.BufferAttribute(stype,1));
const starMat = new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`
    attribute float size; attribute float stype; uniform float uTime;
    varying float vA; varying float vType;
    void main(){
      vType=stype;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      float tw=stype<0.3?0.3+0.7*abs(sin(uTime*1.4+position.x*0.3+position.y*0.2)):
               stype<0.7?0.7+0.3*sin(uTime*0.8+position.z*0.15):
                         0.75+0.25*sin(uTime*0.5+position.x*0.05);
      vA=tw;
      gl_PointSize=size*(8000.0/-mv.z);
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    varying float vA; varying float vType;
    void main(){
      vec2 uv=gl_PointCoord-vec2(0.5);
      float d=length(uv); if(d>0.5)discard;
      float core=smoothstep(0.5,0.0,d);
      float spike=0.0;
      if(vType>0.8){float ax=abs(uv.x),ay=abs(uv.y);spike=(exp(-ax*28.0)*exp(-ay*ay*60.0)+exp(-ay*28.0)*exp(-ax*ax*60.0))*0.55;}
      else if(vType>0.4){float ax=abs(uv.x),ay=abs(uv.y);spike=(exp(-ax*40.0)*exp(-ay*ay*80.0)+exp(-ay*40.0)*exp(-ax*ax*80.0))*0.25;}
      float a=(core+spike)*vA;
      vec3 col=vType>0.8?mix(vec3(0.7,0.82,1.0),vec3(1.0),core):vType>0.4?mix(vec3(0.75,0.80,0.90),vec3(1.0),core):vec3(0.60,0.63,0.70);
      gl_FragColor=vec4(col,a);
    }`,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ── Lights ─────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff,0.015));
const key=new THREE.DirectionalLight(0xdde8f0,1.6); key.position.set(-60,120,140); scene.add(key);
const topRim=new THREE.DirectionalLight(0xffffff,1.4); topRim.position.set(0,200,80); scene.add(topRim);
const backRim=new THREE.DirectionalLight(0xb0c0d8,1.0); backRim.position.set(20,-100,-180); scene.add(backRim);
const fill=new THREE.DirectionalLight(0x141414,0.5); fill.position.set(120,-60,80); scene.add(fill);
const sp1=new THREE.PointLight(0xffffff,3200,480); scene.add(sp1);
const sp2=new THREE.PointLight(0xd0dcf0,1800,380); scene.add(sp2);

// ── Drag rotation ──────────────────────────────────────────────────────────────
let drag=false,px=0,py=0,vx=0,vy=0,rx=0.08,ry=0;
canvas.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;vx=vy=0;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  vx=(e.clientY-py)*0.006; vy=(e.clientX-px)*0.006;
  rx+=vx; ry+=vy; px=e.clientX; py=e.clientY;
});
// ── Touch: single-finger rotate + two-finger pinch zoom ───────────────────────
let pinching = false;
let lastPinchDist = 0;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    drag = true;
    px = e.touches[0].clientX; py = e.touches[0].clientY;
    vx = vy = 0;
  } else if (e.touches.length === 2) {
    drag = false;
    pinching = true;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });

window.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinching = false;
  if (e.touches.length === 0) drag = false;
});

window.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinching) {
    // Pinch zoom
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const delta = lastPinchDist - dist;
    targetZ = Math.max(60, Math.min(700, targetZ + delta * 1.2));
    lastPinchDist = dist;
  } else if (e.touches.length === 1 && drag) {
    // Single-finger rotate
    vx = (e.touches[0].clientY - py) * 0.006;
    vy = (e.touches[0].clientX - px) * 0.006;
    rx += vx; ry += vy;
    px = e.touches[0].clientX; py = e.touches[0].clientY;
  }
}, { passive: true });
let targetZ = 320;
window.addEventListener('wheel', e => {
  targetZ = Math.max(60, Math.min(700, targetZ + e.deltaY * 0.4));
}, { passive: true });

// ── Animate ────────────────────────────────────────────────────────────────────
const clk=new THREE.Clock();
(function animate(){
  requestAnimationFrame(animate);
  const t=clk.getElapsedTime();
  if(!drag){
    vx*=0.93; vy*=0.93;
    if(Math.hypot(vx,vy)<0.001) vy+=0.0007;
    rx+=vx; ry+=vy;
  }
  pivot.rotation.x=rx; pivot.rotation.y=ry;
  camera.position.z += (targetZ - camera.position.z) * 0.1;
  starMat.uniforms.uTime.value=t;
  stars.rotation.y=t*0.012; stars.rotation.x=t*0.005;
  sp1.position.set(Math.sin(t*0.7)*160, Math.cos(t*0.5)*120+50, 190+Math.sin(t*0.35)*60);
  sp2.position.set(Math.cos(t*0.6)*150, Math.sin(t*0.4)*90-30,  170+Math.cos(t*0.45)*55);
  renderer.render(scene,camera);
})();
</script>
</body>
</html>
