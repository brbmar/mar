    height: 25px;

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');

  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  const blobs = [
    { x: W * 0.05, y: H * 0.10, r: 380, vx: 0.22, vy: 0.09, color: [255, 140, 200] },
    { x: W * 0.90, y: H * 0.15, r: 340, vx: -0.11, vy: 0.19, color: [120, 180, 255] },
    { x: W * 0.15, y: H * 0.85, r: 360, vx: 0.17, vy: -0.13, color: [185, 130, 255] },
    { x: W * 0.85, y: H * 0.80, r: 300, vx: -0.19, vy: -0.08, color: [255, 225, 80] },
    { x: W * 0.50, y: H * 0.05, r: 280, vx: -0.08, vy: 0.21, color: [100, 225, 195] },
  ];

  function draw() {
    ctx.clearRect(0, 0, W, H);

    for (const b of blobs) {
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      grad.addColorStop(0, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},0.28)`);
      grad.addColorStop(1, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},0)`);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }

  function update() {
    for (const b of blobs) {
      b.x += b.vx;
      b.y += b.vy;
      if (b.x < -b.r) b.x = W + b.r;
      if (b.x > W + b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = H + b.r;
      if (b.y > H + b.r) b.y = -b.r;
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  });

  loop();
</script>
