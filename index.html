<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    overflow: hidden;
    background: #f0ede8;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  section {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: clamp(5rem, 18vw, 14rem);
    color: #000000;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .hero-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  /* ── NAVBAR ── */
  .navbar {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 25vw;
    height: 50px;
    z-index: 10;
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: none;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .nav-logo {
    height: 25px;
    display: flex;
    align-items: center;
  }

  .nav-logo svg {
    height: 25px;
    width: auto;
    fill: #000000;
    display: block;
  }

  .nav-hand {
    font-size: 25px;
    width: 25px;
    height: 25px;
    line-height: 25px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    cursor: pointer;
    transform-origin: 75% 85%;
    transition: none;
  }

  .nav-hand:hover {
    animation: wave 0.7s ease-in-out;
  }

  @keyframes wave {
    0%   { transform: rotate(  0deg); }
    10%  { transform: rotate(-10deg); }
    25%  { transform: rotate( 20deg); }
    40%  { transform: rotate(-10deg); }
    55%  { transform: rotate( 18deg); }
    70%  { transform: rotate( -8deg); }
    85%  { transform: rotate( 12deg); }
    100% { transform: rotate(  0deg); }
  }

  .nav-instagram {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
  }

  .nav-instagram svg {
    width: 25px;
    height: 25px;
    display: block;
  }
  @media (max-width: 768px) {
    .navbar {
      width: 50vw;
    }
  }
</style>
</head>
